<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPA Profile Management</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      padding: 42px;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    .intro {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: #2563eb;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin: 0 auto 18px;
    }

    .intro h1 {
      font-size: 40px;
      color: #111827;
      margin-bottom: 12px;
    }

    .intro p {
      color: #6b7280;
      font-size: 17px;
      line-height: 1.6;
    }

    h2 {
      font-size: 28px;
      color: #1f2937;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: #374151;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .success-message {
      display: none;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 18px;
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px;
      }

      .intro h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="intro">
      <div class="logo">IPA</div>
      <h1>My Profile</h1>
      <p>
        View and update your IPA member information.
      </p>
    </div>

    <h2>Profile Management</h2>
    <p class="subtitle">Update your personal details below.</p>

    <form action="/profile" method="POST">

      {% if success_message %}
      <div id="successMessage" class="success-message" style="display: block;">
        {{ success_message }}
      </div>
      {% endif %}

      {% if error_message %}
      <div class="error-message" style="background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; padding: 12px; border-radius: 10px; margin-bottom: 18px; text-align: center; font-size: 14px; display: block;">
        {{ error_message }}
      </div>
      {% endif %}

      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" placeholder="Enter your first name" value="{{ user.first_name }}">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" placeholder="Enter your last name" value="{{ user.last_name }}">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" value="{{ user.email }}">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter your phone number" value="{{ user.phone }}">
      </div>

      <div class="form-group">
        <label>Member Type</label>
        <select name="member_type">
          <option value="Student Member" {% if user.member_type == 'Student Member' %}selected{% endif %}>Student Member</option>
          <option value="Regular Member" {% if user.member_type == 'Regular Member' %}selected{% endif %}>Regular Member</option>
          <option value="Premium Member" {% if user.member_type == 'Premium Member' %}selected{% endif %}>Premium Member</option>
          <option value="Honorary Member" {% if user.member_type == 'Honorary Member' %}selected{% endif %}>Honorary Member</option>
        </select>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea name="address" placeholder="Enter your address">{{ user.address if user.address }}</textarea>
      </div>

      <button type="submit">Save Changes</button>

    </form>

  </div>


</body>

</html>
