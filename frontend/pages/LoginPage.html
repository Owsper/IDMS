<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPA Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      padding: 42px;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    .intro {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: #2563eb;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin: 0 auto 18px;
    }

    .intro h1 {
      font-size: 40px;
      color: #111827;
      margin-bottom: 12px;
    }

    .intro p {
      color: #6b7280;
      font-size: 17px;
      line-height: 1.6;
    }

    h2 {
      font-size: 28px;
      color: #1f2937;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }


    .input-error {
      border: 1px solid #dc2626 !important;
      background: #fef2f2;
    }

    .error-message {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 18px;
      text-align: center;
      font-size: 14px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0;
      color: #374151;
    }

    .checkbox input {
      width: auto;
    }

    .forgot {
      text-align: right;
      margin-bottom: 20px;
    }

    .forgot a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .error-message {
      display: none;
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 18px;
      text-align: center;
      font-size: 14px;
    }

    .signup {
      margin-top: 20px;
      text-align: center;
    }

    .signup a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px;
      }

      .intro h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="intro">
      <div class="logo">IPA</div>
      <h1>Welcome Back</h1>
      <p>
        Sign in to access your IPA member account.
      </p>
    </div>

    <h2>Member Login</h2>

    <form action="/login" method="POST">

      {% if error_message %}
      <div class="error-message" style="display: block;">{{ error_message }}</div>
      {% endif %}

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="email" placeholder="Enter your email" value="{{ request.form.get('email', '') }}">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password">
      </div>

      <div class="checkbox">
        <input type="checkbox">
        <span>Remember me</span>
      </div>

      <div class="forgot">
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">Sign In</button>

    </form>

    <div class="signup">
      Don't have an account?
      <a href="/register">Create Account</a>
    </div>

  </div>

</body>

</html>
