<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pexel - Forgot Password</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: white;

    /* SAME STYLE AS REGISTER PAGE BACKGROUND */
    background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        radial-gradient(circle at 55% 62%, rgba(124, 58, 237, 0.32), transparent 32%),
        radial-gradient(circle at 70% 70%, rgba(14, 165, 233, 0.18), transparent 28%),
        #11101e;

    background-size: 40px 40px, 40px 40px, auto, auto;
}

/* CENTER CARD */
.card {
    width: 100%;
    max-width: 420px;

    background: #0d1017;
    border: 1px solid #2b3152;
    border-radius: 14px;

    padding: 36px;

    box-shadow:
        0 25px 60px rgba(0,0,0,0.45),
        0 0 40px rgba(124,58,237,0.10);
}

/* BRAND */
.brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    font-weight: 900;
    font-size: 20px;
}

.brand-icon {
    width: 38px;
    height: 38px;
    background: #7c3aed;
    border-radius: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
}

/* TITLE */
h1 {
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 6px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: #8190b8;
    margin-bottom: 26px;
}

/* FORM */
.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    font-size: 13px;
    color: #8ea0c8;
    margin-bottom: 6px;
}

input {
    width: 100%;
    height: 44px;

    background: #1a1f2d;
    border: 1px solid #2b3152;

    border-radius: 8px;

    color: white;
    font-size: 14px;

    padding: 0 12px;
    outline: none;
}

input::placeholder {
    color: #7c89aa;
}

input:focus {
    border-color: #7c3aed;
    box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
}

/* BUTTON */
button {
    width: 100%;
    height: 44px;

    border: none;
    border-radius: 8px;

    background: linear-gradient(90deg, #7c3aed, #8b5cf6);

    color: white;
    font-weight: 900;
    font-size: 14px;

    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

/* FOOTER LINK */
.bottom {
    margin-top: 18px;
    text-align: center;
    font-size: 13px;
    color: #8190b8;
}

.bottom a {
    color: #a855f7;
    text-decoration: none;
    font-weight: 800;
}

.bottom a:hover {
    text-decoration: underline;
}

/* MOBILE */
@media (max-width: 500px) {
    .card {
        padding: 28px;
    }

    h1 {
        font-size: 22px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="brand">
        <div class="brand-icon">↯</div>
        <div>Pexel</div>
    </div>

    <h1>Reset Password</h1>

    <div class="subtitle">
        Enter your email to receive a reset link
    </div>

    <form method="POST">

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="dev@pexel.io" required>
        </div>

        <button type="submit">Send Reset Link →</button>

    </form>

    <div class="bottom">
        Remember password?
        <a href="{{ url_for('login') }}">Sign in</a>
    </div>

</div>

</body>
</html>
