
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                135deg,
                #f8fbff 0%,
                #eef4ff 50%,
                #dbeafe 100%
            );
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.08);
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            margin: 0 auto 18px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 30px;
            color: #111827;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .helper-text {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 22px 0;
        }

        .checkbox input {
            width: auto;
            margin-top: 3px;
        }

        .checkbox label {
            margin: 0;
            font-weight: 400;
            color: #4b5563;
            line-height: 1.5;
        }

        button {
            width: 100%;
            border: none;
            background: #2563eb;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .signin {
            margin-top: 22px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .signin a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .signin a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .card {
                padding: 28px;
            }

            .name-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="logo">IPO</div>

        <div class="header">
            <h1>Create Your Account</h1>
            <p>
                Register to access IPO member services and manage your account securely.
            </p>
        </div>

        <form method="POST">

            <div class="name-row">

                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input
                        type="text"
                        id="first_name"
                        name="first_name"
                        placeholder="John"
                        required>
                </div>

                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input
                        type="text"
                        id="last_name"
                        name="last_name"
                        placeholder="Smith"
                        required>
                </div>

            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="+1 234 567 8900"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="john.smith@example.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a secure password"
                    required>
                <small class="helper-text">
                    Minimum 8 characters, including a number and special character.
                </small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Re-enter your password"
                    required>
            </div>

            <div class="checkbox">
                <input
                    type="checkbox"
                    id="terms"
                    name="terms"
                    required>

                <label for="terms">
                    I agree to the Terms of Service and Privacy Policy.
                </label>
            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="signin">
            Already have an account?
            <a href="LoginPage.html">Sign In</a>
        </div>

    </div>

</body>

</html>
```
